---
# java-discovery-playbook.yml
#
# Ansible conversion of a Bash one-liner that walks the filesystem looking for
# every `java` binary and prints its version + runtime properties.
#
# Original script behaviour (see docs/java-discovery.md for the executive
# summary and the verbatim source):
#   * print the hostname
#   * find / -type f -iname java        (case-insensitive)
#   * skip anything that is not executable
#   * run `java -version` for each hit
#   * run `java -XshowSettings:properties -version` and grep out
#     java.runtime.version and java.vendor (gracefully noting when a JVM is
#     too old to support that flag)
#
# Run against the local box:
#   ansible-playbook -i localhost, -c local docs/java-discovery-playbook.yml
#
# Run across an inventory and also drop a per-host text report on each target:
#   ansible-playbook -i inventory docs/java-discovery-playbook.yml \
#     -e write_report_file=true -e report_dir=/var/tmp

- name: Discover Java installations and report version details
  hosts: all
  gather_facts: true
  become: true

  vars:
    # Where to start the filesystem walk. `/` mirrors the original script;
    # override (e.g. /usr, /opt) to make the scan dramatically faster.
    java_search_root: /

    # Set true to also persist a plain-text report on each target host.
    write_report_file: false
    report_dir: /tmp

    # An octal mode is "executable" when any of the three permission digits
    # (owner/group/other) is odd: 1,3,5,7 all carry the execute bit. The regex
    # is anchored to the final three characters so leading setuid/sticky bits
    # never produce a false positive.
    exec_mode_regex: '([1357][0-7][0-7]|[0-7][1357][0-7]|[0-7][0-7][1357])$'

  tasks:
    - name: Find every file named "java" under the search root
      ansible.builtin.find:
        paths: "{{ java_search_root }}"
        # (?i) = case-insensitive, mirroring `find -iname java`
        patterns: '(?i)^java$'
        use_regex: true
        file_type: file
        recurse: true
        hidden: true
      register: java_find
      # find skips directories it cannot read, reproducing the script's
      # `2>/dev/null` silencing of permission-denied noise.

    - name: Keep only the executable java binaries
      ansible.builtin.set_fact:
        java_binaries: >-
          {{ java_find.files
             | selectattr('mode', 'search', exec_mode_regex)
             | map(attribute='path')
             | sort
             | list }}

    - name: Report when no Java was found
      ansible.builtin.debug:
        msg: "No executable 'java' binary found under {{ java_search_root }} on {{ inventory_hostname }}."
      when: java_binaries | length == 0

    - name: Collect "java -version" output for each binary
      ansible.builtin.command:
        cmd: "{{ item }} -version"
      register: java_version
      changed_when: false
      failed_when: false        # a broken/partial JVM should not abort the run
      loop: "{{ java_binaries }}"
      loop_control:
        label: "{{ item }}"

    - name: Collect runtime properties for each binary
      ansible.builtin.command:
        cmd: "{{ item }} -XshowSettings:properties -version"
      register: java_props
      changed_when: false
      failed_when: false
      loop: "{{ java_binaries }}"
      loop_control:
        label: "{{ item }}"

    - name: Build the discovery report
      ansible.builtin.set_fact:
        java_report: |
          Hostname: {{ inventory_hostname }}
          Searching for Java installations...

          Java binaries found: {{ java_binaries | length }}
          {% for v, p in (java_version.results | default([])) | zip(java_props.results | default([])) %}

          ----------------------------------------
          Java binary location: {{ v.item }}

          ---- java -version ----
          {{ ((v.stderr | default('')) ~ (v.stdout | default(''))) | trim }}

          ---- java runtime properties ----
          {% set props = ((p.stderr | default('')) ~ (p.stdout | default(''))) | regex_findall('(?m)^\s*(?:java\.runtime\.version|java\.vendor)\s*=.*$') %}
          {% if props %}
          {% for line in props %}
          {{ line | trim }}
          {% endfor %}
          {% else %}
          This Java does not support -XshowSettings:properties
          {% endif %}
          ----------------------------------------
          {% endfor %}
      when: java_binaries | length > 0

    - name: Print the discovery report
      ansible.builtin.debug:
        msg: "{{ java_report.split('\n') }}"
      when: java_binaries | length > 0

    - name: Persist the report to disk (optional)
      ansible.builtin.copy:
        content: "{{ java_report }}"
        dest: "{{ report_dir }}/java-discovery-{{ inventory_hostname }}.txt"
        mode: "0644"
      when:
        - write_report_file | bool
        - java_binaries | length > 0
